<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOICE AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0a0a0a;
            --surface: #111111;
            --border: #222222;
            --accent: #00ff88;
            --accent2: #ff3366;
            --text: #f0f0f0;
            --muted: #555;
            --user-bubble: #1a1a2e;
            --ai-bubble: #0d1f0d;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Syne', sans-serif;
            background: var(--bg);
            color: var(--text);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* NOISE TEXTURE OVERLAY */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.03'/%3E%3C/svg%3E");
            pointer-events: none;
            z-index: 100;
            opacity: 0.4;
        }

        /* HEADER */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 32px;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-mark {
            width: 32px;
            height: 32px;
            border: 2px solid var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .logo-mark::after {
            content: '';
            width: 10px;
            height: 10px;
            background: var(--accent);
            border-radius: 50%;
            animation: pulse-dot 2s ease-in-out infinite;
        }

        @keyframes pulse-dot {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(0.6); opacity: 0.5; }
        }

        .logo-text {
            font-size: 18px;
            font-weight: 800;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .status-pill {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 14px;
            border: 1px solid var(--border);
            border-radius: 100px;
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            color: var(--muted);
        }

        .status-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: var(--muted);
            transition: background 0.3s, box-shadow 0.3s;
        }

        .status-dot.connected {
            background: var(--accent);
            box-shadow: 0 0 8px var(--accent);
        }

        .status-dot.recording {
            background: var(--accent2);
            box-shadow: 0 0 8px var(--accent2);
            animation: blink 0.8s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.2; }
        }

        /* CHAT AREA */
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
        }

        .chat-area::-webkit-scrollbar { width: 4px; }
        .chat-area::-webkit-scrollbar-track { background: transparent; }
        .chat-area::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        .empty-state {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            color: var(--muted);
            text-align: center;
        }

        .empty-state .big-icon {
            font-size: 48px;
            filter: grayscale(1);
            opacity: 0.3;
        }

        .empty-state p {
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            line-height: 1.8;
        }

        /* MESSAGES */
        .message {
            display: flex;
            flex-direction: column;
            gap: 6px;
            max-width: 75%;
            animation: slide-in 0.3s ease;
        }

        @keyframes slide-in {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user { align-self: flex-end; align-items: flex-end; }
        .message.ai { align-self: flex-start; align-items: flex-start; }

        .message-label {
            font-family: 'Space Mono', monospace;
            font-size: 10px;
            color: var(--muted);
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 0 4px;
        }

        .message-bubble {
            padding: 14px 18px;
            border-radius: 2px;
            font-size: 15px;
            line-height: 1.6;
            border: 1px solid transparent;
        }

        .message.user .message-bubble {
            background: var(--user-bubble);
            border-color: #2a2a4a;
            border-bottom-right-radius: 12px;
        }

        .message.ai .message-bubble {
            background: var(--ai-bubble);
            border-color: #1a3a1a;
            border-bottom-left-radius: 12px;
        }

        .audio-row {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-top: 6px;
        }

        .play-btn {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            border: 1px solid var(--accent);
            background: transparent;
            color: var(--accent);
            cursor: pointer;
            font-size: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .play-btn:hover {
            background: var(--accent);
            color: var(--bg);
        }

        .audio-bar {
            flex: 1;
            height: 2px;
            background: var(--border);
            border-radius: 1px;
            position: relative;
            overflow: hidden;
        }

        .audio-bar-fill {
            position: absolute;
            left: 0; top: 0; bottom: 0;
            background: var(--accent);
            width: 0%;
            transition: width 0.1s linear;
        }

        /* PROCESSING STATE */
        .processing-msg {
            align-self: flex-start;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px 18px;
            border: 1px solid var(--border);
            border-radius: 2px;
            border-bottom-left-radius: 12px;
            color: var(--muted);
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            animation: slide-in 0.3s ease;
        }

        .dots span {
            animation: dot-bounce 1.2s ease-in-out infinite;
            display: inline-block;
        }
        .dots span:nth-child(2) { animation-delay: 0.2s; }
        .dots span:nth-child(3) { animation-delay: 0.4s; }

        @keyframes dot-bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        /* BOTTOM CONTROL BAR */
        .control-bar {
            border-top: 1px solid var(--border);
            padding: 24px 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 32px;
            flex-shrink: 0;
            background: var(--surface);
        }

        /* WAVEFORM VISUALIZER */
        .waveform {
            display: flex;
            align-items: center;
            gap: 3px;
            height: 40px;
            width: 120px;
            opacity: 0;
            transition: opacity 0.3s;
        }

        .waveform.active { opacity: 1; }

        .wave-bar {
            flex: 1;
            background: var(--accent2);
            border-radius: 2px;
            height: 4px;
            transition: height 0.1s ease;
        }

        /* RECORD BUTTON */
        .record-btn {
            width: 72px;
            height: 72px;
            border-radius: 50%;
            border: 2px solid var(--accent);
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.25s;
            position: relative;
            flex-shrink: 0;
        }

        .record-btn::before {
            content: '';
            position: absolute;
            inset: -6px;
            border-radius: 50%;
            border: 1px solid var(--accent);
            opacity: 0.2;
            transition: all 0.25s;
        }

        .record-btn:hover::before { inset: -10px; opacity: 0.3; }

        .record-btn .btn-icon {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: var(--accent);
            transition: all 0.25s;
        }

        .record-btn.recording {
            border-color: var(--accent2);
            animation: record-ring 1.5s ease-in-out infinite;
        }

        .record-btn.recording::before { border-color: var(--accent2); }

        .record-btn.recording .btn-icon {
            background: var(--accent2);
            border-radius: 4px;
            width: 22px;
            height: 22px;
        }

        @keyframes record-ring {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255,51,102,0.4); }
            50% { box-shadow: 0 0 0 12px rgba(255,51,102,0); }
        }

        .record-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* HINT TEXT */
        .hint {
            font-family: 'Space Mono', monospace;
            font-size: 11px;
            color: var(--muted);
            text-align: center;
            margin-top: 10px;
        }

        /* ERROR TOAST */
        .toast {
            position: fixed;
            top: 80px;
            left: 50%;
            transform: translateX(-50%) translateY(-20px);
            background: #2a0a0a;
            border: 1px solid var(--accent2);
            color: var(--accent2);
            padding: 10px 20px;
            border-radius: 4px;
            font-family: 'Space Mono', monospace;
            font-size: 12px;
            opacity: 0;
            transition: all 0.3s;
            pointer-events: none;
            z-index: 200;
            white-space: nowrap;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* SCROLLBAR for Firefox */
        .chat-area { scrollbar-width: thin; scrollbar-color: var(--border) transparent; }
    </style>
</head>
<body>

<header>
    <div class="logo">
        <div class="logo-mark"></div>
        <span class="logo-text">Voice AI</span>
    </div>
    <div class="status-pill">
        <div class="status-dot" id="statusDot"></div>
        <span id="statusLabel">connecting...</span>
    </div>
</header>

<div class="chat-area" id="chatArea">
    <div class="empty-state" id="emptyState">
        <div class="big-icon">🎙️</div>
        <p>Press the button below to start talking.<br>Your AI responds in real time.</p>
    </div>
</div>

<div class="toast" id="toast"></div>

<div class="control-bar">
    <div class="waveform" id="waveform">
        <div class="wave-bar" id="w1"></div>
        <div class="wave-bar" id="w2"></div>
        <div class="wave-bar" id="w3"></div>
        <div class="wave-bar" id="w4"></div>
        <div class="wave-bar" id="w5"></div>
        <div class="wave-bar" id="w6"></div>
        <div class="wave-bar" id="w7"></div>
        <div class="wave-bar" id="w8"></div>
    </div>

    <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
        <button class="record-btn" id="recordBtn" disabled>
            <div class="btn-icon"></div>
        </button>
        <div class="hint" id="hintText">initializing...</div>
    </div>

    <div class="waveform" id="waveformRight">
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
        <div class="wave-bar"></div>
    </div>
</div>

<script>
const SERVER = 'http://localhost:5001';

let mediaRecorder = null;
let audioChunks = [];
let isRecording = false;
let analyser = null;
let audioCtx = null;
let waveInterval = null;
let currentAudio = null;

const recordBtn = document.getElementById('recordBtn');
const statusDot = document.getElementById('statusDot');
const statusLabel = document.getElementById('statusLabel');
const chatArea = document.getElementById('chatArea');
const emptyState = document.getElementById('emptyState');
const hintText = document.getElementById('hintText');
const waveform = document.getElementById('waveform');
const waveformRight = document.getElementById('waveformRight');
const toast = document.getElementById('toast');

// ── TOAST ──────────────────────────────────────────────
function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 3500);
}

// ── STATUS ─────────────────────────────────────────────
function setStatus(state, label) {
    statusDot.className = 'status-dot ' + (state || '');
    statusLabel.textContent = label;
}

// ── WAVEFORM ANIMATION ─────────────────────────────────
function startWaveform(analyserNode) {
    const bars = waveform.querySelectorAll('.wave-bar');
    const barsR = waveformRight.querySelectorAll('.wave-bar');
    waveform.classList.add('active');
    waveformRight.classList.add('active');

    const dataArray = new Uint8Array(analyserNode.frequencyBinCount);

    function animate() {
        if (!isRecording) return;
        analyserNode.getByteFrequencyData(dataArray);
        bars.forEach((bar, i) => {
            const val = dataArray[i * 4] || 0;
            const h = Math.max(4, (val / 255) * 36);
            bar.style.height = h + 'px';
        });
        barsR.forEach((bar, i) => {
            const val = dataArray[(7 - i) * 4] || 0;
            const h = Math.max(4, (val / 255) * 36);
            bar.style.height = h + 'px';
        });
        requestAnimationFrame(animate);
    }
    animate();
}

function stopWaveform() {
    waveform.classList.remove('active');
    waveformRight.classList.remove('active');
    waveform.querySelectorAll('.wave-bar').forEach(b => b.style.height = '4px');
    waveformRight.querySelectorAll('.wave-bar').forEach(b => b.style.height = '4px');
}

// ── CHAT MESSAGES ──────────────────────────────────────
function clearEmpty() {
    if (emptyState && emptyState.parentNode) {
        emptyState.remove();
    }
}

function addMessage(role, text, audioUrl = null) {
    clearEmpty();
    const msg = document.createElement('div');
    msg.className = `message ${role}`;

    const label = document.createElement('div');
    label.className = 'message-label';
    label.textContent = role === 'user' ? 'YOU' : 'AI';

    const bubble = document.createElement('div');
    bubble.className = 'message-bubble';
    bubble.textContent = text;

    msg.appendChild(label);
    msg.appendChild(bubble);

    if (audioUrl && role === 'ai') {
        const audioRow = document.createElement('div');
        audioRow.className = 'audio-row';

        const playBtn = document.createElement('button');
        playBtn.className = 'play-btn';
        playBtn.innerHTML = '▶';

        const bar = document.createElement('div');
        bar.className = 'audio-bar';
        const fill = document.createElement('div');
        fill.className = 'audio-bar-fill';
        bar.appendChild(fill);

        const audio = new Audio(audioUrl);
        audio.addEventListener('timeupdate', () => {
            const pct = (audio.currentTime / audio.duration) * 100;
            fill.style.width = pct + '%';
        });
        audio.addEventListener('ended', () => {
            playBtn.innerHTML = '▶';
            fill.style.width = '0%';
        });

        playBtn.addEventListener('click', () => {
            if (audio.paused) {
                audio.play();
                playBtn.innerHTML = '⏸';
            } else {
                audio.pause();
                playBtn.innerHTML = '▶';
            }
        });

        audioRow.appendChild(playBtn);
        audioRow.appendChild(bar);
        msg.appendChild(audioRow);

        // Auto-play
        setTimeout(() => {
            audio.play().catch(() => {});
            playBtn.innerHTML = '⏸';
        }, 100);
    }

    chatArea.appendChild(msg);
    chatArea.scrollTop = chatArea.scrollHeight;
    return msg;
}

function addProcessing() {
    clearEmpty();
    const el = document.createElement('div');
    el.className = 'processing-msg';
    el.id = 'processingMsg';
    el.innerHTML = `<span>AI is thinking</span><span class="dots"><span>.</span><span>.</span><span>.</span></span>`;
    chatArea.appendChild(el);
    chatArea.scrollTop = chatArea.scrollHeight;
}

function removeProcessing() {
    const el = document.getElementById('processingMsg');
    if (el) el.remove();
}

// ── RECORDING ─────────────────────────────────────────
async function startRecording() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });

        // Setup analyser for waveform
        audioCtx = new AudioContext();
        analyser = audioCtx.createAnalyser();
        analyser.fftSize = 64;
        const source = audioCtx.createMediaStreamSource(stream);
        source.connect(analyser);

        // Record as WAV-compatible format
        const options = MediaRecorder.isTypeSupported('audio/webm;codecs=pcm')
            ? { mimeType: 'audio/webm;codecs=pcm' }
            : MediaRecorder.isTypeSupported('audio/webm')
            ? { mimeType: 'audio/webm' }
            : {};

        mediaRecorder = new MediaRecorder(stream, options);
        audioChunks = [];

        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.onstop = async () => {
            stream.getTracks().forEach(t => t.stop());
            if (audioCtx) { audioCtx.close(); audioCtx = null; }
            await processAudio();
        };

        mediaRecorder.start(100);
        isRecording = true;

        recordBtn.classList.add('recording');
        setStatus('recording', 'recording');
        hintText.textContent = 'click to stop';
        startWaveform(analyser);

    } catch (err) {
        showToast('Microphone access denied');
        console.error(err);
    }
}

function stopRecording() {
    if (mediaRecorder && isRecording) {
        isRecording = false;
        mediaRecorder.stop();
        recordBtn.classList.remove('recording');
        recordBtn.disabled = true;
        setStatus('connected', 'processing');
        hintText.textContent = 'processing...';
        stopWaveform();
    }
}

async function processAudio() {
    const blob = new Blob(audioChunks, { type: 'audio/webm' });

    if (blob.size < 1000) {
        showToast('Recording too short, try again');
        resetBtn();
        return;
    }

    addProcessing();

    const formData = new FormData();
    formData.append('file', blob, 'recording.webm');
    formData.append('voice', 'en');

    try {
        const response = await fetch(`${SERVER}/v1/voice/chat`, {
            method: 'POST',
            body: formData
        });

        removeProcessing();

        if (!response.ok) {
            const err = await response.json();
            showToast(`Error: ${err.error || response.status}`);
            resetBtn();
            return;
        }

        const data = await response.json();
        const userText = data.user_text || '(unclear)';
        const aiText = data.response_text || '';
        const audioUrl = data.audio_url ? `${SERVER}${data.audio_url}` : null;

        addMessage('user', userText);
        addMessage('ai', aiText, audioUrl);

    } catch (err) {
        removeProcessing();
        showToast('Connection error');
        console.error(err);
    }

    resetBtn();
}

function resetBtn() {
    recordBtn.disabled = false;
    setStatus('connected', 'ready');
    hintText.textContent = 'click to talk';
}

// ── BUTTON CLICK ───────────────────────────────────────
recordBtn.addEventListener('click', () => {
    if (isRecording) {
        stopRecording();
    } else {
        startRecording();
    }
});

// ── SERVER HEALTH CHECK ────────────────────────────────
async function checkServer() {
    try {
        const r = await fetch(`${SERVER}/health`);
        const data = await r.json();
        if (data.status === 'ok') {
            setStatus('connected', 'ready');
            hintText.textContent = 'click to talk';
            recordBtn.disabled = false;

            if (!data.whisper_loaded) {
                showToast('Whisper will load on first use');
            }
        }
    } catch {
        setStatus('', 'server offline');
        hintText.textContent = 'server not running';
        showToast('Cannot connect to server on localhost:5001');
        setTimeout(checkServer, 4000);
    }
}

checkServer();
</script>
</body>
</html>
